name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            25
            21

      # Deliberately v5, not v6: v6 moves caching into `gradle-actions-caching`,
      # a proprietary component whose use means accepting Gradle's Terms of Use.
      # v5 is the last MIT-licensed release and already runs on Node 24.
      - uses: gradle/actions/setup-gradle@v5

      - name: Build 1.21.x jar
        run: ./gradlew build -Pmc=21
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_21_X64 }}

      - name: Build 26.x jar
        run: ./gradlew build -Pmc=26 -x test
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_25_X64 }}

      - name: Extract changelog section
        run: |
          awk '/^## \[/{n++} n==1' CHANGELOG.md > RELEASE_NOTES.md || echo "See CHANGELOG.md" > RELEASE_NOTES.md

      - name: Create release
        run: gh release create "$GITHUB_REF_NAME" build/libs/BetterAntiDupe-*.jar --title "$GITHUB_REF_NAME" --notes-file RELEASE_NOTES.md
        env:
          GH_TOKEN: ${{ github.token }}
