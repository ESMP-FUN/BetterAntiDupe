# PluginPulse updater configuration.
# https://github.com/darkstarworks/PluginPulse
#
# Modrinth is the primary source; GitHub Releases is the fallback.
modrinth: antidupepro
github: darkstarworks/AntiDupePro

permission: antidupe.admin
command-root: /adp
user-agent-contact: https://github.com/darkstarworks/AntiDupePro
prefix: "<gold>[AntiDupePro]</gold>"

# off | check-only | notify | download | auto-stage
# Server owners can override this (and check-interval-hours) from an
# `update:` section in AntiDupePro's own config.yml.
mode: notify
check-interval-hours: 6

# AntiDupePro ships a separate "-mc26" build for Minecraft 26.x; servers on
# 26.x follow that release line automatically.
track: mc26
