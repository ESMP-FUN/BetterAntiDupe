# BetterAntiDupe Configuration

# Language for all in-game messages. Bundled options:
#   en (English), pt_BR (Português do Brasil), es (Español),
#   de (Deutsch), ru (Русский), pl (Polski)
# Your own edits in messages.yml always win over the bundled translation,
# and anything a translation is missing falls back to English.
language: en

# =============================================================================
# DETECTION
# =============================================================================
detection:
  # Global detection sensitivity, 1 (very lenient) to 100 (very paranoid).
  # 50 is balanced and right for most casual servers. Higher values lower the
  # excess needed to alert and tighten source-bound match windows.
  sensitivity: 50

  # Optional command run on the console when an admin confirms a duper with
  # /adp ledger confirm. {player} is replaced with the name. Leave empty to do
  # nothing. Example: "tempban {player} 7d Item duplication"
  on_confirm_command: ""

# =============================================================================
# NOTIFICATIONS (Discord / Telegram / Slack / custom webhooks)
# =============================================================================
# Push dupe alerts to services outside the game. Everything is off by default.
# Notifications use the same language as your messages.yml.
notifications:
  # Only send alerts at or above this severity: LOW, MEDIUM, HIGH, CRITICAL.
  # HIGH is a good default - your channel won't be bothered by small wobbles.
  min_severity: HIGH

  # Don't re-send the same kind of alert (same player + same item) more often
  # than this many seconds. Protects your channel from alert bursts.
  rate_limit_seconds: 30

  # Discord: channel settings -> Integrations -> Webhooks -> New Webhook,
  # then paste the webhook URL here.
  discord:
    enabled: false
    webhook_url: ""

  # Telegram: create a bot with @BotFather to get the bot token. The chat id
  # is the group/channel the bot should post in (add the bot there first;
  # @userinfobot or @getidsbot can tell you the id).
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""

  # Slack: create an Incoming Webhook (api.slack.com/messaging/webhooks)
  # and paste the URL here.
  slack:
    enabled: false
    webhook_url: ""

  # Generic webhook for everything else (n8n, Zapier, your own bot...).
  # Sends an HTTP POST with a JSON body describing the alert:
  # { "plugin", "type", "severity", "player", "playerUuid", "material",
  #   "details", "timestamp" }
  generic:
    enabled: false
    url: ""

# Console log verbosity. One of: CRITICAL, ERROR, WARNING, INFO, DEBUG.
# Each level includes the ones above it (WARNING also shows ERROR + CRITICAL).
# Note: CRITICAL and ERROR both map to the server's SEVERE level.
console_log_level: INFO

# =============================================================================
# STORAGE BACKEND
# =============================================================================
# SQLITE (default) — file-based, persistent, zero ops. Recommended.
# REDIS          — fast, shareable across multiple servers, requires a running Redis.
# MEMORY         — in-process only; data lost on restart. Dev/testing only.
storage:
  backend: SQLITE
  # SQLite file path, relative to the plugin data folder.
  sqlite_file: "storage.db"
  # SQLite file for the v2 ledger (separate file so you can wipe one without the other).
  sqlite_ledger_file: "ledger.db"

# =============================================================================
# REDIS CONFIGURATION (used only when storage.backend: REDIS)
# =============================================================================
redis:
  # Redis server host
  host: "localhost"

  # Redis server port
  port: 6379

  # Redis database number (0-15)
  database: 0

  # Redis password (leave empty if no password)
  password: ""

  # Connection timeout in seconds
  timeout: 10

# =============================================================================
# TRACKED MATERIALS, TMAR LIMITS, ALERT THRESHOLDS
# =============================================================================
# All material-keyed lists now live in materials.yml (next to this file).
# That keeps config.yml short even when many items are tracked. Edit the
# tracked items list, rate limits and alert thresholds there.

# =============================================================================
# DUPER PREVENTION (block-duplication contraptions)
# =============================================================================
# Rail / carpet / TNT / gravity dupers duplicate BLOCKS in the world through
# piston update-order exploits — no inventory event fires, so ledger tracking
# alone only catches the aftermath. These toggles cancel the contraption
# mechanic itself. All on by default.
#
# prevent-rail-dupers / prevent-carpet-dupers:
#   Cancels piston movement of any block that has a rail or carpet resting on
#   top of it (the detach-mid-move trick every rail/carpet duper relies on).
#   Also cancels a moving slime/honey block dragging a rail or carpet off one of
#   its side or bottom faces (the observer + slime-block variant that pulls the
#   carpet out from beside/under the slime instead of a pushed block's top).
#   Side effect: contraptions that pop carpets/rails off with pistons stop
#   working, and a slime/honey flying machine won't move while flush against a
#   rail/carpet — vanilla-legal but rarely used outside dupers.
prevent-rail-dupers: true
prevent-carpet-dupers: true

# prevent-gravity-dupers:
#   Cancels falling blocks (sand, gravel, concrete powder, dragon egg, ...)
#   travelling through portals — the end-portal sand duper family. Pistons
#   pushing sand (flying machines, legit farms) are deliberately unaffected.
prevent-gravity-dupers: true

# prevent-tnt-dupers:
#   Cancels piston movement of TNT blocks. Turn this off if your players run
#   TNT-duper world eaters on purpose (some anarchy/tech servers allow it).
prevent-tnt-dupers: true

# prevent-container-desync-dupers:
#   Closes open container GUIs when the container goes away (shulker box or
#   chest broken / blown up, donkey or chest-boat chunk unloading). Stops the
#   "phantom GUI" dupes where items are taken from a GUI whose container no
#   longer exists while the dropped container keeps them too. No gameplay
#   cost — a legitimately open GUI simply closes.
prevent-container-desync-dupers: true

# prevent-shutdown-dupers:
#   Closes every open inventory when the server begins shutting down. On
#   restart the server writes player data and world data as separate steps;
#   a transfer that lands between the two is saved on one side and not the
#   other, so the item exists twice on next boot. No open GUI means no
#   in-flight transfer to race. No gameplay cost — the server is stopping.
#   Note this only covers a clean shutdown (/stop, restart plugins). A crash
#   or `kill -9` runs no plugin code; ledger reconciliation is the backstop.
prevent-shutdown-dupers: true

# ---------- Anonymous metrics ----------
# BetterAntiDupe reports anonymous usage statistics through FastStats.
#
# Why: the plugin works quietly and the docs are thorough, so almost nobody
# opens a ticket — which leaves no way to know which Minecraft versions are
# actually running it. Knowing that is what makes it possible to fight
# duplication exploits for those versions first, instead of guessing. The
# statistics are kept private, not published on a public page: while the
# install base is small, public numbers would tell dupers how likely any
# given server is to be protected.
#
# What is sent: which storage backend you use, which prevention toggles are
# on, how many materials you track, your language, and whether shadow mode,
# auto-delete and tag hiding are enabled — plus the server software, Minecraft
# version, Java version and plugin version that FastStats collects itself.
#
# What is never sent: IP addresses, server names, player names or UUIDs, item
# data, ledger contents, or anything else that could identify you or a player.
#
# Set enabled to false to send nothing at all.
metrics:
  enabled: true

  # Error reporting sends stack traces when the plugin throws, which helps fix
  # bugs you'd otherwise have to report by hand. Off by default: a stack trace
  # can carry incidental detail (a file path, an id) that plain counters can't,
  # so this is yours to opt into. UUIDs, home directories and anything that
  # looks like a password or token are stripped before a report is sent.
  error_reporting: false

# Auto-delete detected dupes
# If true, automatically removes duped items from the game
# If false, only logs and alerts admins
auto_delete_dupes: false

# Shadow mode
# Track suspects and log their stash locations before taking action
shadow_mode: true

# If true, cancel double-click "collect to cursor" on tracked materials.
# Off by default; only useful for the strictest paranoia mode.
block_collect_to_cursor: false

# Hide the ownership tag from players' clients.
# On by default. ADP strips its own PersistentDataContainer keys from items in
# CLIENT-BOUND packets, so a player using an NBT-viewer mod / OptiFine cannot read
# the tag (e.g. cannot run a two-account "does the tag change on pickup" test).
# The tag stays fully intact server-side — detection is unaffected. Only ADP's own
# keys are stripped; other plugins' data and resource-pack item models are untouched.
# Set to false if you ever need the tag visible client-side (debugging, etc.).
hide_tag_from_clients: true

# Strict mode: strip EVERY plugin's custom item data from packets sent to clients,
# not just BetterAntiDupe's own tag — anything the client receives is "clean".
# Off by default: CIT resource packs and client mods that read item data (sorting
# helpers, price/tooltip overlays) will see stripped items as blank.
strip_all_custom_data: false
# Namespaces that survive strict mode, e.g. "itemsadder" or "mmoitems", so those
# plugins' items keep working client-side. BetterAntiDupe's own namespace is never
# allowed here (it would defeat the concealment) and is ignored if listed.
strip_whitelist: []

# What the ownership tag is called in item data. Changing these de-brands the tag —
# a leaked screenshot or stream frame then shows e.g. "data:o" instead of
# "antidupepro:adp_owner", revealing nothing about which plugin wrote it.
# Renaming is safe: the previous name is remembered automatically and items tagged
# under it stay tracked, re-stamping onto the new name as they change hands.
ownership:
  namespace: "antidupepro"
  key: "adp_owner"
  # Old names to keep recognizing. Filled automatically on rename; only add
  # entries yourself if you've renamed more than once and skipped versions.
  legacy_keys: []

# =============================================================================
# CHAIN OF CUSTODY (Ledger + Proof of Witness)
# =============================================================================
# As of 3.0.0 the ledger is the sole detection system. The legacy per-item
# isotope tags have been removed (they broke vanilla stacking). All settings
# below tune the ledger; it is always on.

ledger:
  # Redis database number for ledger data (used only with storage.backend: REDIS).
  redis_database: 1

  # Proof of Witness settings
  witness:
    # Radius in blocks for witness detection (default: 48 = ~3 chunks)
    radius: 48

    # Minimum witnesses for VERIFIED trust level
    verified_threshold: 3

    # Flag suspicious patterns (high solo-action ratio)
    flag_suspicious_patterns: true

    # Solo ratio threshold for suspicion (0.0-1.0)
    # If >80% of a player's actions are unwitnessed on a populated server, flag them
    suspicious_solo_ratio: 0.8

  # Reconciliation settings
  reconciliation:
    # Cooldown between reconciliations per player (milliseconds)
    cooldown_ms: 5000

    # Run reconciliation on item pickup
    on_pickup: true

    # Run reconciliation on inventory close
    on_inventory_close: false

  # Alert thresholds (excess items per material) are configured in materials.yml.
